name: Build and Release

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  release:
    types: [published]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Checkout SDK
      uses: actions/checkout@v4
      with:
        repository: ${{ github.repository_owner }}/sdk
        path: sdk

    - name: Use Node.js 20.x
      uses: actions/setup-node@v4
      with:
        node-version: 20

    - name: Fix Local Dependencies
      run: sed -i 's|file:\.\./|file:./|g' package.json

    - name: Install dependencies
      run: npm install

    - name: Run Tests
      run: npm test

    - name: Build
      run: npm run build --if-present
